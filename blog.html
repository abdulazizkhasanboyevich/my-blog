<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all blog posts on development, design, writing, and life.">
  <title>Blog — Texnoblog</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function () {
      var t = localStorage.getItem('blog-theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body data-page="blog">

  <header class="site-header">
    <div class="container">
      <nav class="nav" aria-label="Main navigation">
        <a href="index.html" class="nav__logo">Texnoblog</a>

        <ul class="nav__links">
          <li><a href="index.html" class="nav__link" data-nav="home">Home</a></li>
          <li><a href="blog.html" class="nav__link" data-nav="blog">Blog</a></li>
          <li><a href="about.html" class="nav__link" data-nav="about">About</a></li>
        </ul>

        <div class="nav__actions">
          <button class="theme-toggle" aria-label="Toggle dark mode">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </button>
          <button class="nav__toggle" aria-label="Open menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <header class="page-header">
        <h1 class="page-header__title">All posts</h1>
        <p class="page-header__desc">Essays and notes on code, creativity, design, and the things that make life interesting.</p>
      </header>

      <div class="posts-grid page-content" id="all-posts"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer__inner">
        <p class="footer__copy">&copy; 2026 Texnoblog. Barcha huquqlar himoyalangan.</p>
        <nav class="footer__links" aria-label="Footer navigation">
          <a href="index.html">Home</a>
          <a href="blog.html">Blog</a>
          <a href="about.html">About</a>
        </nav>
      </div>
    </div>
  </footer>

  <script src="js/posts.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
